# ═══════════════════════════════════════════════════════
# EXTERNAL INTEGRATIONS
# ═══════════════════════════════════════════════════════
integrations:
  ha_green:
    type: Home Assistant
    runs_on: HA Green (separate device on mesh)
    capabilities:
      - Wyoming STT (speech-to-text)
      - Wyoming TTS (text-to-speech)
      - Smart home automations
      - MQTT broker
      - Node-RED flows
    godot_bridge: scripts/autoloads/ha_bridge.gd
    do_not_duplicate: true
    note: "Voice bridge = this. Do not build another voice system."

  tailscale_mesh:
    devices:
      crucible: "Ryzen 7 — Ollama, LiteLLM, forge-guardian service"
      librarian_tower: "i7-4790 DDR3 — ChromaDB, indexing (RAM-sensitive)"
      ha_green: "Home Assistant — STT/TTS/automations"
    note: "Never hardcode Tailscale IPs. Load from secret-tool/config at runtime."

  addons_installed:
    - name: LimboAI
      version: "1.6.0"
      status: runtime_verified
      use_for: NPC behavior trees, state machines
    - name: Dialogic 2
      version: "2.0-Alpha-19"
      status: active
      use_for: NPC dialogue timelines
    - name: godot_ai_mcp
      version: "1.1.0"
      status: active
      use_for: MCP plugin, port 8000

