# GODOT SYSTEMS — WHAT'S ALREADY BUILT
# ═══════════════════════════════════════════════════════
godot_systems:
  autoloads:
    event_bus:
      path: scripts/autoloads/event_bus.gd
      status: VERIFIED
      purpose: "ALL inter-system signals. Never bypass."

    save_manager:
      path: scripts/autoloads/save_manager.gd
      status: VERIFIED
      purpose: "ALL persistence. Schema v1. No SQLite. user:// only."

    quest_manager:
      path: scripts/autoloads/quest_manager.gd
      status: ACTIVE
      purpose: "ALL quest state. Only autoload allowed to manage quests."

    ha_bridge:
      path: scripts/autoloads/ha_bridge.gd
      status: ACTIVE
      purpose: "ONLY file that calls Home Assistant. Circuit breaker built in."

    hardware_manager:
      path: scripts/autoloads/hardware_manager.gd
      status: ACTIVE
      purpose: "ONLY file that detects hardware. Cached at startup."

    dialogic_stub:
      path: scripts/autoloads/dialogic_stub.gd
      status: ACTIVE
      purpose: "Bridges Dialogic 2 timelines. Falls back to JSON."

    config_loader:
      path: scripts/autoloads/config_loader.gd
      status: ACTIVE
      purpose: "Loads user://config.json. Player settings."

  npc_bases:
