# EMBRAL — Manifest v1.0
# RULE: Register here BEFORE creating any file.
# RULE: Every script, scene, data file, and asset gets an entry.
# RULE: If it's not here, it doesn't belong in the repo.
# Last updated: 2026-04-19

project:
  name: Embral
  version: 0.1.0-foundation
  engine: godot-4.x
  license: MIT
  repo: https://github.com/dragonbornjedi-code/embral
  single_device: true
  no_backend_ai: true
  no_rag: true

# ═══════════════════════════════════════════
# DOCS — Reference documents (no scripts in docs/)
# ═══════════════════════════════════════════
docs:
  roadmap:
    path: docs/roadmap.md
    purpose: Living development roadmap, phase 0.00–5.00.
    status: active

  compatibility:
    path: docs/compatibility.md
    purpose: Dependency and compatibility matrix. Pinned versions.
    status: active

  source_of_truth:
    path: docs/source_of_truth.md
    purpose: Defines the authoritative hierarchy for runtime state vs. files vs. docs vs. model assumptions.
    status: active

  naming_conventions:
    path: docs/naming_conventions.md
    purpose: Canonical naming rules for realms, NPCs, quests, files, and variables.
    status: active

# ═══════════════════════════════════════════
# PLUGINS / ADDONS
# ═══════════════════════════════════════════
plugins:
  godot_ai:
    path: addons/godot_ai/plugin.cfg
    version: "0.2.0"
    type: editor_plugin
    status: active

  limboai:
    path: addons/limboai/bin/limboai.gdextension
    version: "1.6.0"
    type: gdextension
    compatibility: "godot>=4.2"
    purpose: NPC behavior trees and hierarchical state machines.
    status: on_disk_pending_restart
    note: >
      GDExtension auto-discovered on editor start. Binary verified as valid
      ELF x86_64. Requires editor restart to activate. No plugin.cfg needed.

  godot_sqlite:
    path: addons/godot-sqlite/bin/godot-sqlite.gdextension
    version: TBD
    type: gdextension
    purpose: Persistent SQL storage for quest state and parental tracking.
    status: not_installed
    stub: scripts/autoloads/sqlite_stub.gd
    note: Deferred to Phase 2+. Stub circuit-breaker active.

  dialogic:
    path: addons/dialogic/plugin.cfg
    version: TBD
    type: editor_plugin
    purpose: Dialogue timelines for NPC conversations.
    status: not_installed
    note: Deferred to 1.03 verification. Stub fallback in data/dialogue/.
autoloads:
  event_bus:
    path: scripts/autoloads/event_bus.gd
    purpose: Cross-system signal bus. ALL inter-system events go through here.
    status: planned

  hardware_manager:
    path: scripts/autoloads/hardware_manager.gd
    purpose: Detects all hardware at startup. Results cached. Never re-polled.
    detects: [keyboard_mouse, ps5_dualsense, wii_hardware, ha_green,
              esp32, arduino, raspberry_pi]
    status: planned

  ha_bridge:
    path: scripts/autoloads/ha_bridge.gd
    purpose: ONLY file that communicates with Home Assistant. Circuit breaker built in.
    status: planned

  quest_manager:
    path: scripts/autoloads/quest_manager.gd
    purpose: Loads quest JSON, tracks completion, fires rewards.
    status: planned

  config_loader:
    path: scripts/autoloads/config_loader.gd
    purpose: Loads user://config.json. Player settings and preferences.
    status: planned

  save_manager:
    path: scripts/autoloads/save_manager.gd
    purpose: Manages game state persistence (Quest, NPC, Player stats).
    status: active
    schema_version: 1

  sqlite_stub:
    path: scripts/autoloads/sqlite_stub.gd
    purpose: >
      Circuit-breaker stub for Godot-SQLite. Returns null/false for all calls
      when the real SQLite GDExtension is not installed. Allows code to call
      SqliteDB.query() safely without crashing. Replace with real addon when
      complex queries are needed (Phase 2+).
    status: stub

  dialogic_stub:
    path: scripts/autoloads/dialogic_stub.gd
    purpose: >
      Circuit-breaker stub for Dialogic 2. When Dialogic is not installed,
      reads fallback dialogue from data/dialogue/{npc_id}_fallback.json.
      Exposes the same minimal API surface so NPC scripts don't need to
      branch on Dialogic availability.
    status: stub

# ═══════════════════════════════════════════
# PLAYER SYSTEM
# ═══════════════════════════════════════════
player_system:
  player_profile:
    path: scripts/models/player_profile.gd
    purpose: Data class. Player stats, XP, level, gold, quest completion.
    status: planned

  party_manager:
    path: scripts/player/party_manager.gd
    purpose: Manages traveling party (player + companion + wisps). Max 6 slots.
    status: planned

  player_controller:
    path: scripts/player/player_controller.gd
    purpose: Input handling for player character. Reads from hardware_manager.
    status: planned

# ═══════════════════════════════════════════
# CREATURE SYSTEM
# ═══════════════════════════════════════════
creature_system:

  wisp_data:
    path: scripts/models/wisp_data.gd
    purpose: Data class for a single Wisp instance.
    status: planned

  pet_data:
    path: scripts/models/pet_data.gd
    purpose: Data class for a single Pet instance.
    status: planned

  companion_data:
    path: scripts/models/companion_data.gd
    purpose: Data class for a Companion (second avatar).
    status: planned

  wisp_types:
    ember:   {element: fire,     realm: ember_hollow, visual_color: "1.0, 0.4, 0.1"}
    ripple:  {element: water,    realm: tidemark,     visual_color: "0.2, 0.5, 1.0"}
    breeze:  {element: wind,     realm: forge_run,    visual_color: "0.7, 0.9, 1.0"}
    mossy:   {element: earth,    realm: rootstead,    visual_color: "0.3, 0.6, 0.2"}
    volt:    {element: electric, realm: the_spire,    visual_color: "1.0, 0.95, 0.2"}
    lumis:   {element: light,    realm: the_drift,    visual_color: "1.0, 1.0, 0.8"}
    shade:   {element: dark,     realm: dungeon_only, visual_color: "0.3, 0.2, 0.4"}

# ═══════════════════════════════════════════
# QUEST SYSTEM
# ═══════════════════════════════════════════
quest_system:
  quest_data:
    path: scripts/models/quest_data.gd
    purpose: Data class for quest state (not content — content is JSON).
    status: planned

  quest_loader:
    path: scripts/quest/quest_loader.gd
    purpose: Reads data/quests/ JSON files. Parses into QuestData objects.
    status: planned

  quest_runner:
    path: scripts/quest/quest_runner.gd
    purpose: Executes quest steps, fires events, manages quest state machine.
    status: planned

  quest_reward:
    path: scripts/quest/quest_reward.gd
    purpose: Handles XP grants, gold grants, item/wisp/pet unlocks.
    status: planned

# ═══════════════════════════════════════════
# DUNGEON SYSTEM
# ═══════════════════════════════════════════
dungeon_system:
  dungeon_manager:
    path: scripts/dungeon/dungeon_manager.gd
    purpose: 2D dungeon scene controller. Separate from 3D overworld.
    status: planned

  wisp_battle:
    path: scripts/dungeon/wisp_battle.gd
    purpose: Turn-based Wisp Crystal battle system.
    status: planned

  crystal_system:
    path: scripts/dungeon/crystal_system.gd
    purpose: Crystal types, type effectiveness calculations.
    status: planned

