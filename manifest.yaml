# EMBRAL — Manifest v2.0
# RULE: Register here BEFORE creating any file.
# RULE: Every script, scene, data file, and asset gets an entry.
# RULE: If it's not here, it doesn't belong in the repo.
# Last updated: 2026-04-20

project:
  name: Embral
  version: 0.2.0-phase1-complete
  engine: godot-4.5.stable.official.876b29033
  license: MIT
  repo: https://github.com/dragonbornjedi-code/Embral
  single_device: true
  no_backend_ai: true
  no_rag: true
  no_sqlite: true

# ═══════════════════════════════════════════
# BANNED DEPENDENCIES — NEVER ADD THESE
# ═══════════════════════════════════════════
banned:
  sqlite:           "Not needed. Godot JSON/file system handles all persistence."
  godot_sqlite:     "Was added by Windsurf. Removed. Never re-add."
  ollama:           "No AI inference at runtime. Ever."
  chromadb:         "No vector stores. Ever."
  rag_pipeline:     "No RAG. Ever."
  backend_server:   "Single device game. No servers."

# ═══════════════════════════════════════════
# DOCS — Reference documents (no scripts in docs/)
# ═══════════════════════════════════════════
docs:
  roadmap:
    path: docs/roadmap.md
    purpose: Living development roadmap. Phases 0.00–8.xx. Update after every session.
    status: active

  compatibility:
    path: docs/compatibility.md
    purpose: Dependency and compatibility matrix. Pinned versions.
    status: active

  source_of_truth:
    path: docs/source_of_truth.md
    purpose: Authoritative hierarchy — Runtime > Disk > Docs > Model assumptions.
    status: active

  naming_conventions:
    path: docs/naming_conventions.md
    purpose: Canonical naming rules for realms, NPCs, quests, files, and variables.
    status: active

  session_log:
    path: docs/SESSION.md
    purpose: >
      Updated at the END of every AI session. Tells the NEXT session what was done,
      what is broken, and what to do first. This is the shared memory between AI sessions.
    status: active

  ai_context:
    path: docs/AI_CONTEXT.md
    purpose: >
      Master context prompt loaded by all AI CLI tools via shell aliases.
      Contains current status, next tasks, and critical rules summary.
    status: active

# ═══════════════════════════════════════════
# PLUGINS / ADDONS
# ═══════════════════════════════════════════
plugins:
  godot_ai_mcp:
    path: addons/godot_ai/plugin.cfg
    version: "1.1.0"
    type: editor_plugin
    status: active
    note: MCP plugin. Server runs on port 8000.

  limboai:
    path: addons/limboai/bin/limboai.gdextension
    version: "1.6.0"
    type: gdextension
    compatibility: "godot>=4.2"
    purpose: NPC behavior trees and hierarchical state machines.
    status: runtime_verified
    note: >
      Runtime probe confirmed BehaviorTree, LimboState, and LimboHSM are registered.
      Demo folder (addons/demo/) has been REMOVED — it caused parse errors.

  dialogic:
    path: addons/dialogic/plugin.cfg
    version: "2.0-Alpha-19"
    type: editor_plugin
    purpose: Dialogue timelines for NPC conversations.
    status: runtime_verified
    note: >
      DialogicGameHandler loadable at runtime. dialogic_stub.gd bridges to real
      timelines when available, falls back to JSON when not.

  # REMOVED — do not re-add
  # godot_sqlite was added by Windsurf without authorization.
  # Embral uses Godot's built-in JSON + FileAccess for all persistence.
  # Removing it fixed the startup GDExtension errors.

# ═══════════════════════════════════════════
# AUTOLOADS — registered in project.godot
# ═══════════════════════════════════════════
autoloads:
  event_bus:
    path: scripts/autoloads/event_bus.gd
    purpose: Cross-system signal bus. ALL inter-system events go through here.
    status: active

  hardware_manager:
    path: scripts/autoloads/hardware_manager.gd
    purpose: Detects all hardware at startup. Results cached. Never re-polled.
    detects: [keyboard_mouse, ps5_dualsense, wii_hardware, ha_green,
              esp32, arduino, raspberry_pi]
    status: active

  ha_bridge:
    path: scripts/autoloads/ha_bridge.gd
    purpose: ONLY file that communicates with Home Assistant. Circuit breaker built in.
    status: active

  quest_manager:
    path: scripts/autoloads/quest_manager.gd
    purpose: Loads quest JSON, tracks completion, fires rewards, NPC mastery tracking.
    status: active

  config_loader:
    path: scripts/autoloads/config_loader.gd
    purpose: Loads user://config.json. Player settings and preferences.
    status: active

  save_manager:
    path: scripts/autoloads/save_manager.gd
    purpose: >
      Manages all game state persistence. Schema v1. Auto-migrates v0 saves.
      Quarantines unrecognized schema versions.
    status: active
    schema_version: 1

  dialogic_stub:
    path: scripts/autoloads/dialogic_stub.gd
    purpose: >
      Compatibility bridge for Dialogic 2. Launches real timelines when the plugin
      is available. Falls back to data/dialogue/{npc_id}_fallback.json otherwise.
      Never fails silently — always returns SOME dialogue.
    status: active

  # REMOVED — do not re-add
  # sqlite_stub was added by Windsurf. SQLite is not part of Embral.

# ═══════════════════════════════════════════
# BOOT SYSTEM
# ═══════════════════════════════════════════
boot:
  boot_scene:
    path: scenes/boot.tscn
    purpose: First scene loaded. Runs health checks, verifies autoloads, transitions to main menu.
    root_node_type: Node
    status: active

  boot_script:
    path: scripts/boot.gd
    purpose: Health check logic. Verifies all autoloads. Logs OK/FAIL per system.
    status: active
    notes: >
      Root changed from Node2D to Node. Main menu parenting corrected.
      Deferred scene change fixed the headless boot-time error.

# ═══════════════════════════════════════════
# PLAYER SYSTEM
# ═══════════════════════════════════════════
player_system:
  player_profile:
    path: scripts/models/player_profile.gd
    purpose: Data class. Player stats, XP, level, gold, quest completion.
    status: planned

  party_manager:
    path: scripts/player/party_manager.gd
    purpose: >
      Manages traveling party. Max 6 slots: player + companion + 3 player wisps
      + 3 companion wisps. World renders max 4 entities simultaneously.
    status: planned

  player_controller:
    path: scripts/player/player_controller.gd
    purpose: Input handling. Reads from HardwareManager. Never detects hardware directly.
    status: planned

