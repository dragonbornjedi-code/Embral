# ═══════════════════════════════════════════
# HARDWARE SYSTEM
# ═══════════════════════════════════════════
hardware_system:
  hardware_manager:
    path: scripts/hardware/hardware_manager.gd
    note: THIS IS ALSO AN AUTOLOAD — registered above. One file, two roles.

  ps5_input:
    path: scripts/hardware/ps5_input.gd
    purpose: DualSense haptic feedback, motion, LED bar, adaptive triggers.
    detection: Input.get_connected_joypads() + name contains "dualsense"
    status: planned

  wii_input:
    path: scripts/hardware/wii_input.gd
    purpose: xwiimote integration. Wiimote, Nunchuck, Balance Board, IR Camera.
    detection: scan /proc/bus/input/devices for "Nintendo Wii"
    status: planned

  esp32_client:
    path: scripts/hardware/esp32_client.gd
    purpose: HTTP or serial interface for ESP32 gadgets.
    detection: configurable endpoint ping at startup
    status: planned

  arduino_client:
    path: scripts/hardware/arduino_client.gd
    purpose: Serial interface for Arduino gadgets.
    detection: serial port scan at startup
    status: planned

  pi_client:
    path: scripts/hardware/pi_client.gd
    purpose: SSH or HTTP interface for Raspberry Pi integrations.
    detection: configurable endpoint ping at startup
    status: planned

# ═══════════════════════════════════════════
# SCENES
# ═══════════════════════════════════════════
scenes:
  main_menu:
    path: scenes/ui/main_menu.tscn
    contains: [settings, profile_select, parent_dashboard_entry]
    status: planned

  profile_select:
    path: scenes/ui/profile_select.tscn
    contains: [new_game, continue, profile_list]
    status: planned

  parent_dashboard:
    path: scenes/ui/parent_dashboard.tscn
    access: PIN_gated
    contains: [xp_history, quest_completion, npc_mastery_levels,
               emotional_checkins, strength_weakness_map,
               teaching_style_effectiveness]
    status: planned

  hearthveil:
    path: scenes/overworld/hearthveil/hearthveil.tscn
    type: 3D_overworld
    status: planned

  test_sandbox:
    path: scenes/overworld/hearthveil/test_sandbox.tscn
    type: 3D_overworld
    purpose: Minimal playable sandbox for Phase 0.08 verification. No content. Boot-only.
    status: stub

  dungeons:
    mirror_maze:
      path: scenes/dungeons/mirror_maze.tscn
      realm: ember_hollow
      type: 2D_platformer
      status: planned
    word_caverns:
      path: scenes/dungeons/word_caverns.tscn
      realm: tidemark
      type: 2D_platformer
      status: planned
    obstacle_forge:
