      status: planned
    gear_gauntlet:
      path: scenes/dungeons/gear_gauntlet.tscn
      realm: the_spire
      type: 2D_platformer
      status: planned
    curiosity_cave:
      path: scenes/dungeons/curiosity_cave.tscn
      realm: the_drift
      type: 2D_platformer
      status: planned

# ═══════════════════════════════════════════
# SAVE SYSTEM
# ═══════════════════════════════════════════
save_system:
  files:
    player_save:    user://save/player_profile.json
    world_state:    user://save/world_state.json
    pet_roster:     user://save/pet_roster.json
    wisp_roster:    user://save/wisp_roster.json
    party:          user://save/party.json
    npc_mastery:    user://save/npc_mastery.json
    parent_data:    user://save/parent_dashboard.json
    config:         user://config.json
  cloud_sync: false
  analytics: false
  external_backup: false

# ═══════════════════════════════════════════
# PARENT DASHBOARD DATA TRACKING
# ═══════════════════════════════════════════
parent_dashboard:
  tracks:
    - quest_completion_per_npc
    - xp_earned_per_realm
    - npc_mastery_level_per_npc
    - average_score_per_subcategory
    - time_spent_per_realm
    - emotional_checkin_history
    - retry_count_per_quest         # identifies difficulty/frustration
    - response_latency_per_step     # thinking vs guessing indicator
    - cross_subcategory_strengths   # where skills appear in multiple realms
    - teaching_style_response       # which quest types get highest scores

  emotional_checkin:
    trigger: game_startup_always
    trigger_periodic: every_30_minutes_of_play
    modes:
      - face_selector         # happy/neutral/sad/angry/scared faces
      - color_picker          # what color matches how you feel
      - number_scale          # 1-5 scale with face anchors
      - weather_picker        # sunny/cloudy/rainy/stormy (Body Weather Station)
    player_chooses_mode: true
    stored_in: user://save/parent_dashboard.json

# ═══════════════════════════════════════════
# PLAYER LEVEL MILESTONES
# ═══════════════════════════════════════════
level_milestones:
  1:    tutorial_complete_hearthveil_open
  5:    wisps_unlocked
  10:   companions_unlocked
  25:   ground_mounts_unlocked, companion_home_slot_plus_1
  50:   companion_home_slot_plus_1, new_features_TBD
  75:   companion_home_slot_plus_1, new_features_TBD
  100:  ascension_milestone, flying_mounts_unlocked
  every_25_after_100: companion_home_slot_plus_1

npc_dungeon_unlock: 3_npcs_discovered_per_realm

companion_home_capacity:
  base: 1
  per_25_levels: +1
  formula: "1 + floor(player_level / 25)"
